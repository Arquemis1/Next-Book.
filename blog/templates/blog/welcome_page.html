<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenido a NextStory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0e0e10;
  --surface:  #16161a;
  --surface2: #1f1f25;
  --border:   #2a2a32;
  --accent:   #c8f06e;
  --accent2:  #a8d84e;
  --text:     #e8e8f0;
  --muted:    #6b6b80;
  --muted2:   #3a3a48;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

.welcome-container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem 5%;
  position: relative;
}

/* Efecto de fondo similar al tuyo */
.welcome-container::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(200,240,110,.07) 0%, transparent 70%);
  z-index: 0;
}

.welcome-content {
  position: relative;
  z-index: 10;
  max-width: 650px;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  margin-bottom: 2rem;
}

.logo-mark {
  width: 40px;
  height: 40px;
  background: var(--accent);
  border-radius: 8px;
  display: grid;
  place-items: center;
}

.logo-mark svg { width: 20px; height: 20px; }

.logo-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  color: var(--text);
  letter-spacing: -.02em;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  line-height: 1.1;
  margin-bottom: 1.2rem;
  color: #ffffff;
}

h1 em {
  font-style: normal;
  color: var(--accent);
}

p {
  font-size: 1.1rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 2.5rem;
  font-weight: 300;
}

.buttons-group {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 0.85rem 2rem;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
}

.btn-solid {
  background: var(--accent);
  color: #0e0e10;
  border: none;
}

.btn-solid:hover {
  background: var(--accent2);
  transform: translateY(-2px);
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}

.btn-outline:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(200,240,110,.05);
}

.footer-note {
  position: absolute;
  bottom: 1.5rem;
  font-size: 0.8rem;
  color: var(--muted2);
}

/* ✅ CLASE ESPECIAL PARA ASEGURAR QUE SEA CLICABLE */
.enlace-invitado {
  color: #888 !important;
  text-decoration: underline !important;
  cursor: pointer !important;
  position: relative !important;
  z-index: 9999 !important;
  pointer-events: auto !important;
}

</style>
</head>
<body>

<div class="welcome-container">
  <div class="welcome-content">
    <!-- Logo igual al de tu diseño -->
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="5" height="12" rx="1.5" fill="#0e0e10"/>
          <rect x="9" y="2" width="5" height="8" rx="1.5" fill="#0e0e10"/>
        </svg>
      </div>
      <span class="logo-name">NextStory</span>
    </div>

    <h1>Tu espacio para <em>leer y escribir</em> sin límites</h1>
    <p>Únete a una comunidad donde las historias cobran vida. Descubre nuevos mundos o crea el tuyo propio.</p>

    <!-- 👇 BOTONES -->
    <div class="buttons-group">
      <a href="/accounts/login/" class="btn btn-outline">Iniciar sesión</a>
      <a href="/accounts/register/" class="btn btn-solid">Crear cuenta</a>
    </div>
  </div>

  {# ✅ ENLACE DE INVITADO - VERSIÓN DEFINITIVA Y SEGURA #}
  <div class="footer-note">
    <a href="/home/" class="enlace-invitado">O entra como invitado →</a>
  </div>
</div>

</body>
</html>
